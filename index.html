    <!-- Restore path from 404.html redirect (GitHub Pages SPA trick) -->
    <script>
      (function (l) {
        if (l.search[1] === 'p') {
          var params = l.search.slice(1).split('&');
          var path = params[0].slice(2);          // ?p=/about  → /about
          var query = params[1] ? '?' + params[1].slice(2).replace(/~and~/g, '&') : '';
          window.history.replaceState(
            null, null,
            '/' + path.replace(/~and~/g, '&') + query + l.hash
          );
        }
      }(window.location));
    </script>
